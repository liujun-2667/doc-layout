version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doclayout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doclayout}
      POSTGRES_DB: ${POSTGRES_DB:-doclayout}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doclayout"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-doclayout}:${POSTGRES_PASSWORD:-doclayout}@postgres:5432/${POSTGRES_DB:-doclayout}
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - RESULT_DIR=/app/results
      - MAX_PAGES=50
    volumes:
      - uploads_data:/app/uploads
      - results_data:/app/results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-doclayout}:${POSTGRES_PASSWORD:-doclayout}@postgres:5432/${POSTGRES_DB:-doclayout}
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - RESULT_DIR=/app/results
      - MAX_PAGES=50
    volumes:
      - uploads_data:/app/uploads
      - results_data:/app/results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - uploads_data:/app/uploads
      - results_data:/app/results

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  results_data:
